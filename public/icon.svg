<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1630"/>
      <stop offset="100%" style="stop-color:#0a0a0a"/>
    </linearGradient>
    <linearGradient id="mark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9d97e8"/>
      <stop offset="100%" style="stop-color:#6b63cc"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>
  <!-- Subtle inner border -->
  <rect x="2" y="2" width="508" height="508" rx="106" fill="none" stroke="#2a2460" stroke-width="3" opacity="0.6"/>
  <!-- Glow circle behind mark -->
  <circle cx="256" cy="230" r="120" fill="#7F77DD" opacity="0.07"/>
  <!-- Task lines icon mark -->
  <rect x="148" y="174" width="152" height="24" rx="12" fill="url(#mark)"/>
  <rect x="148" y="218" width="110" height="20" rx="10" fill="url(#mark)" opacity="0.7"/>
  <rect x="148" y="258" width="130" height="20" rx="10" fill="url(#mark)" opacity="0.5"/>
  <!-- Timer circle (right side, focus) -->
  <circle cx="324" cy="300" r="52" fill="none" stroke="url(#mark)" stroke-width="14" stroke-linecap="round"
    stroke-dasharray="260" stroke-dashoffset="80" transform="rotate(-90 324 300)"/>
  <circle cx="324" cy="300" r="6" fill="#7F77DD"/>
  <!-- "FD" wordmark bottom -->
  <text x="256" y="438" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="56" font-weight="700" fill="#7F77DD" text-anchor="middle" opacity="0.9" letter-spacing="-1">FlowDesk</text>
</svg>
